version: '3.8'

# Development override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  web:
    build:
      target: development
    environment:
      - BATCH_PROCESSOR_ENV=development
      # URL Processing Environment Variables for Development
      - URL_PROCESSING_ENABLED=${URL_PROCESSING_ENABLED:-true}
      - URL_PRIORITY=${URL_PRIORITY:-first}
      - URL_TIMEOUT_SECONDS=${URL_TIMEOUT_SECONDS:-10.0}
      - URL_DATABASE_COLLECTION=${URL_DATABASE_COLLECTION:-dev_url_tnved_mapping}
      - URL_BATCH_SIZE=${URL_BATCH_SIZE:-50}
      - URL_NORMALIZATION_ENABLED=${URL_NORMALIZATION_ENABLED:-true}
      - URL_REMOVE_QUERY_PARAMS=${URL_REMOVE_QUERY_PARAMS:-true}
      - URL_REMOVE_FRAGMENTS=${URL_REMOVE_FRAGMENTS:-true}
      - URL_NORMALIZE_PROTOCOL=${URL_NORMALIZE_PROTOCOL:-true}
      - URL_SUPPORTED_SHOPS=${URL_SUPPORTED_SHOPS:-ozon,yandex_market,wildberries}
      - URL_MAX_LENGTH=${URL_MAX_LENGTH:-2048}
      - URL_SECURITY_ENABLED=${URL_SECURITY_ENABLED:-true}
      - URL_VALIDATE_ON_INPUT=${URL_VALIDATE_ON_INPUT:-true}
      - URL_SANITIZE_FOR_STORAGE=${URL_SANITIZE_FOR_STORAGE:-true}
      - URL_MASK_SENSITIVE_PARAMS=${URL_MASK_SENSITIVE_PARAMS:-true}
      - URL_BLOCK_MALICIOUS_PATTERNS=${URL_BLOCK_MALICIOUS_PATTERNS:-false}
      - URL_ENABLE_STATISTICS=${URL_ENABLE_STATISTICS:-true}
      - URL_AUTO_CLEANUP_DUPLICATES=${URL_AUTO_CLEANUP_DUPLICATES:-true}
    volumes:
      - .:/app
      - ./temp_files:/app/temp_files
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    command: python -m uvicorn batch_processor.web.app:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      target: development
    environment:
      - BATCH_PROCESSOR_ENV=development
      # URL Processing Environment Variables for Development
      - URL_PROCESSING_ENABLED=${URL_PROCESSING_ENABLED:-true}
      - URL_PRIORITY=${URL_PRIORITY:-first}
      - URL_TIMEOUT_SECONDS=${URL_TIMEOUT_SECONDS:-10.0}
      - URL_DATABASE_COLLECTION=${URL_DATABASE_COLLECTION:-dev_url_tnved_mapping}
      - URL_BATCH_SIZE=${URL_BATCH_SIZE:-50}
      - URL_NORMALIZATION_ENABLED=${URL_NORMALIZATION_ENABLED:-true}
      - URL_REMOVE_QUERY_PARAMS=${URL_REMOVE_QUERY_PARAMS:-true}
      - URL_REMOVE_FRAGMENTS=${URL_REMOVE_FRAGMENTS:-true}
      - URL_NORMALIZE_PROTOCOL=${URL_NORMALIZE_PROTOCOL:-true}
      - URL_SUPPORTED_SHOPS=${URL_SUPPORTED_SHOPS:-ozon,yandex_market,wildberries}
      - URL_MAX_LENGTH=${URL_MAX_LENGTH:-2048}
      - URL_SECURITY_ENABLED=${URL_SECURITY_ENABLED:-true}
      - URL_VALIDATE_ON_INPUT=${URL_VALIDATE_ON_INPUT:-true}
      - URL_SANITIZE_FOR_STORAGE=${URL_SANITIZE_FOR_STORAGE:-true}
      - URL_MASK_SENSITIVE_PARAMS=${URL_MASK_SENSITIVE_PARAMS:-true}
      - URL_BLOCK_MALICIOUS_PATTERNS=${URL_BLOCK_MALICIOUS_PATTERNS:-false}
      - URL_ENABLE_STATISTICS=${URL_ENABLE_STATISTICS:-true}
      - URL_AUTO_CLEANUP_DUPLICATES=${URL_AUTO_CLEANUP_DUPLICATES:-true}
    volumes:
      - .:/app
      - ./temp_files:/app/temp_files
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    command: celery -A batch_processor.workers.celery_app worker --loglevel=debug --queues=processing,default

  cleanup_worker:
    build:
      target: development
    environment:
      - BATCH_PROCESSOR_ENV=development
    volumes:
      - .:/app
      - ./temp_files:/app/temp_files
      - ./logs:/app/logs
    command: celery -A batch_processor.workers.celery_app worker --loglevel=debug --queues=cleanup

  scheduler:
    build:
      target: development
    environment:
      - BATCH_PROCESSOR_ENV=development
    volumes:
      - .:/app
      - ./logs:/app/logs
    command: celery -A batch_processor.workers.celery_app beat --loglevel=debug
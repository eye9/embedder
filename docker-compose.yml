version: '3.8'

services:
  # Redis service for task queue and caching
  redis:
    image: redis:7-alpine
    container_name: batch_processor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - batch_processor_network

  # Web application service
  web:
    build:
      context: .
      target: production
    container_name: batch_processor_web
    ports:
      - "8000:8000"
    environment:
      - BATCH_PROCESSOR_CONFIG=/app/batch_processor_config.yaml
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # URL Processing Environment Variables
      - URL_PROCESSING_ENABLED=${URL_PROCESSING_ENABLED:-true}
      - URL_PRIORITY=${URL_PRIORITY:-first}
      - URL_TIMEOUT_SECONDS=${URL_TIMEOUT_SECONDS:-5.0}
      - URL_DATABASE_COLLECTION=${URL_DATABASE_COLLECTION:-url_tnved_mapping}
      - URL_BATCH_SIZE=${URL_BATCH_SIZE:-100}
      - URL_NORMALIZATION_ENABLED=${URL_NORMALIZATION_ENABLED:-true}
      - URL_REMOVE_QUERY_PARAMS=${URL_REMOVE_QUERY_PARAMS:-true}
      - URL_REMOVE_FRAGMENTS=${URL_REMOVE_FRAGMENTS:-true}
      - URL_NORMALIZE_PROTOCOL=${URL_NORMALIZE_PROTOCOL:-true}
      - URL_SUPPORTED_SHOPS=${URL_SUPPORTED_SHOPS:-ozon,yandex_market,wildberries,aliexpress}
      - URL_MAX_LENGTH=${URL_MAX_LENGTH:-2048}
      - URL_SECURITY_ENABLED=${URL_SECURITY_ENABLED:-true}
      - URL_VALIDATE_ON_INPUT=${URL_VALIDATE_ON_INPUT:-true}
      - URL_SANITIZE_FOR_STORAGE=${URL_SANITIZE_FOR_STORAGE:-true}
      - URL_MASK_SENSITIVE_PARAMS=${URL_MASK_SENSITIVE_PARAMS:-true}
      - URL_BLOCK_MALICIOUS_PATTERNS=${URL_BLOCK_MALICIOUS_PATTERNS:-true}
      - URL_ENABLE_STATISTICS=${URL_ENABLE_STATISTICS:-true}
      - URL_AUTO_CLEANUP_DUPLICATES=${URL_AUTO_CLEANUP_DUPLICATES:-true}
    volumes:
      - ./temp_files:/app/temp_files
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
      - ./batch_processor_config.yaml:/app/batch_processor_config.yaml
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - batch_processor_network

  # Celery worker for processing tasks
  worker:
    build:
      context: .
      target: production
    container_name: batch_processor_worker
    command: celery -A batch_processor.workers.celery_app worker --loglevel=info --queues=processing,default
    environment:
      - BATCH_PROCESSOR_CONFIG=/app/batch_processor_config.yaml
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # URL Processing Environment Variables
      - URL_PROCESSING_ENABLED=${URL_PROCESSING_ENABLED:-true}
      - URL_PRIORITY=${URL_PRIORITY:-first}
      - URL_TIMEOUT_SECONDS=${URL_TIMEOUT_SECONDS:-5.0}
      - URL_DATABASE_COLLECTION=${URL_DATABASE_COLLECTION:-url_tnved_mapping}
      - URL_BATCH_SIZE=${URL_BATCH_SIZE:-100}
      - URL_NORMALIZATION_ENABLED=${URL_NORMALIZATION_ENABLED:-true}
      - URL_REMOVE_QUERY_PARAMS=${URL_REMOVE_QUERY_PARAMS:-true}
      - URL_REMOVE_FRAGMENTS=${URL_REMOVE_FRAGMENTS:-true}
      - URL_NORMALIZE_PROTOCOL=${URL_NORMALIZE_PROTOCOL:-true}
      - URL_SUPPORTED_SHOPS=${URL_SUPPORTED_SHOPS:-ozon,yandex_market,wildberries,aliexpress}
      - URL_MAX_LENGTH=${URL_MAX_LENGTH:-2048}
      - URL_SECURITY_ENABLED=${URL_SECURITY_ENABLED:-true}
      - URL_VALIDATE_ON_INPUT=${URL_VALIDATE_ON_INPUT:-true}
      - URL_SANITIZE_FOR_STORAGE=${URL_SANITIZE_FOR_STORAGE:-true}
      - URL_MASK_SENSITIVE_PARAMS=${URL_MASK_SENSITIVE_PARAMS:-true}
      - URL_BLOCK_MALICIOUS_PATTERNS=${URL_BLOCK_MALICIOUS_PATTERNS:-true}
      - URL_ENABLE_STATISTICS=${URL_ENABLE_STATISTICS:-true}
      - URL_AUTO_CLEANUP_DUPLICATES=${URL_AUTO_CLEANUP_DUPLICATES:-true}
    volumes:
      - ./temp_files:/app/temp_files
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
      - ./batch_processor_config.yaml:/app/batch_processor_config.yaml
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "batch_processor.workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - batch_processor_network

  # Celery worker for cleanup tasks
  cleanup_worker:
    build:
      context: .
      target: production
    container_name: batch_processor_cleanup_worker
    command: celery -A batch_processor.workers.celery_app worker --loglevel=info --queues=cleanup
    environment:
      - BATCH_PROCESSOR_CONFIG=/app/batch_processor_config.yaml
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./temp_files:/app/temp_files
      - ./logs:/app/logs
      - ./batch_processor_config.yaml:/app/batch_processor_config.yaml
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "batch_processor.workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - batch_processor_network

  # Celery beat scheduler for periodic tasks
  scheduler:
    build:
      context: .
      target: production
    container_name: batch_processor_scheduler
    command: celery -A batch_processor.workers.celery_app beat --loglevel=info
    environment:
      - BATCH_PROCESSOR_CONFIG=/app/batch_processor_config.yaml
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./batch_processor_config.yaml:/app/batch_processor_config.yaml
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - batch_processor_network

  # Flower for monitoring Celery tasks (optional)
  flower:
    build:
      context: .
      target: production
    container_name: batch_processor_flower
    command: celery -A batch_processor.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - batch_processor_network
    profiles:
      - monitoring

volumes:
  redis_data:
    driver: local

networks:
  batch_processor_network:
    driver: bridge
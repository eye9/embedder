[pytest]
# Pytest configuration for ТНВЭД Embedder System

# Filter out known deprecation warnings from dependencies
filterwarnings =
    # Suppress pymorphy2 pkg_resources deprecation warning
    ignore::UserWarning:pymorphy2.analyzer
    # Suppress general pkg_resources warnings
    ignore:.*pkg_resources is deprecated.*:DeprecationWarning
    ignore:.*pkg_resources is deprecated.*:UserWarning

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers

# Minimum Python version
minversion = 3.9
